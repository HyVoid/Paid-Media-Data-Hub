# GitHub Actions workflow to build and deploy this Vite React application to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write          # ← 添加这行
  id-token: write       # ← 添加这行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # 现在 package-lock.json 存在，缓存可以生效

      - name: Install Dependencies
        run: npm ci  # ← 改成 npm ci（更适合 CI 环境）

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
